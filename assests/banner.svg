<svg width="1600" height="500" viewBox="0 0 1600 500" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1600" y2="500">
<stop offset="0%" stop-color="#07090F"/>
<stop offset="50%" stop-color="#0B1020"/>
<stop offset="100%" stop-color="#07090F"/>
</linearGradient>

<linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#8B5CF6"/>
<stop offset="100%" stop-color="#6D28D9"/>
</linearGradient>

<linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#38BDF8"/>
<stop offset="100%" stop-color="#2563EB"/>
</linearGradient>

<filter id="blur1">
<feGaussianBlur stdDeviation="70"/>
</filter>

<filter id="glow">
<feGaussianBlur stdDeviation="6" result="coloredBlur"/>
<feMerge>
<feMergeNode in="coloredBlur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

<style>

